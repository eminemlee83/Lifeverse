<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>LIFEVERSE — 인생의 책</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#16213E">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <div class="app-header">
    <div class="brand"><span class="dot">●</span> LIFEVERSE</div>
    <a class="navlink" href="part2.html">📚 서재</a>
  </div>
  <div id="banner-slot"></div>
  <div id="app"></div>
</div>

<script src="https://js.tosspayments.com/v2/standard"></script>

<script src="engine/01-world-vocab.js"></script>
<script src="engine/02-narrative-rules.js"></script>
<script src="engine/03-story-generator.js"></script>
<script src="engine/04-completion-engine.js"></script>
<script src="engine/05-scene-engine.js"></script>
<script src="engine/06-book-structure.js"></script>
<script src="engine/payment-toss-client.js"></script>

<script>
const K = { goal: 'lv_goal', archive: 'lv_archive', books: 'lv_completedBooks' };

function loadJSON(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch (e) { return fallback; }
}
function saveJSON(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
function todayIso() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function addDays(iso, n) {
  const d = new Date(iso + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function el(html) {
  const t = document.createElement('template');
  t.innerHTML = html.trim();
  return t.content.firstElementChild;
}
function showBanner(kind, msg) {
  const slot = document.getElementById('banner-slot');
  slot.innerHTML = '';
  slot.appendChild(el('<div class="banner ' + kind + '">' + msg + '</div>'));
}

function computeStreakState(archive, todayIsoStr) {
  let streak = 0, bestEnded = 0, prevIso = null;
  archive.forEach((entry) => {
    const continued = prevIso && daysBetween(prevIso, entry.dateIso) === 1;
    if (entry.isRestDay || !continued) { if (streak > bestEnded) bestEnded = streak; }
    streak = entry.isRestDay ? 0 : (continued ? streak + 1 : 1);
    prevIso = entry.dateIso;
  });
  const enteringToday = (prevIso && daysBetween(prevIso, todayIsoStr) === 1) ? streak : 0;
  return { currentStreak: enteringToday, previousBestStreak: bestEnded };
}

function ensureArchived(goal, archive) {
  const books = loadJSON(K.books, []);
  if (!isAlreadyArchived(books, goal)) {
    books.push(buildCompletedBookSnapshot(goal, archive));
    saveJSON(K.books, books);
  }
  return books.find((b) => b.text === goal.text && b.startDateIso === goal.startDateIso) ||
         loadJSON(K.books, []).find((b) => b.text === goal.text && b.startDateIso === goal.startDateIso);
}
function updateArchivedPurchase(goal, purchaseInfo) {
  const books = loadJSON(K.books, []);
  const idx = books.findIndex((b) => b.text === goal.text && b.startDateIso === goal.startDateIso);
  if (idx >= 0) { books[idx].purchase = purchaseInfo; saveJSON(K.books, books); }
}

function renderGoalForm() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  let chosenCat = null, chosenDur = 21;

  const panel = el('<div class="panel"><h2>새 이야기 시작하기</h2><div class="sub">오늘부터의 행동이 하나의 책이 됩니다. 카테고리와 기간을 정해 주세요.</div></div>');

  const catGrid = el('<div class="cat-grid"></div>');
  CATEGORIES.forEach((c) => {
    const chip = el('<div class="cat-chip" data-id="' + c.id + '"><span class="emo">' + c.emoji + '</span>' + c.label + '</div>');
    chip.onclick = () => { chosenCat = c.id; [...catGrid.children].forEach((x) => x.classList.remove('active')); chip.classList.add('active'); };
    catGrid.appendChild(chip);
  });
  panel.appendChild(catGrid);

  const textField = el('<label class="field"><span class="lbl">무엇을 이루고 싶나요</span><input type="text" id="goalText" placeholder="예: 매일 30분 걷기"></label>');
  panel.appendChild(textField);

  const titleField = el('<label class="field"><span class="lbl">책 제목 (비워두면 자동으로 지어드려요)</span><input type="text" id="bookTitle" placeholder="예: 산맥을 걷는 사람"></label>');
  panel.appendChild(titleField);

  const durWrap = el('<label class="field"><span class="lbl">기간</span></label>');
  const durGrid = el('<div class="dur-grid"></div>');
  [7, 14, 21, 30, 60, 90].forEach((d) => {
    const chip = el('<div class="dur-chip' + (d === 21 ? ' active' : '') + '">' + d + '일</div>');
    chip.onclick = () => { chosenDur = d; [...durGrid.children].forEach((x) => x.classList.remove('active')); chip.classList.add('active'); };
    durGrid.appendChild(chip);
  });
  durWrap.appendChild(durGrid);
  panel.appendChild(durWrap);

  const submitBtn = el('<button class="btn btn-gold" style="margin-top:16px;">이야기 시작하기</button>');
  submitBtn.onclick = () => {
    const text = document.getElementById('goalText').value.trim();
    if (!chosenCat) { showBanner('err', '카테고리를 선택해 주세요.'); return; }
    if (!text) { showBanner('err', '무엇을 이루고 싶은지 적어 주세요.'); return; }
    const start = todayIso();
    const goal = {
      text,
      categoryId: chosenCat,
      startDateIso: start,
      targetDateIso: addDays(start, chosenDur - 1),
      durationDays: chosenDur,
      bookTitle: document.getElementById('bookTitle').value.trim() || (text + ' 이야기'),
    };
    saveJSON(K.goal, goal);
    saveJSON(K.archive, []);
    document.getElementById('banner-slot').innerHTML = '';
    render();
  };
  panel.appendChild(submitBtn);
  app.appendChild(panel);
}

function renderQuestChecklist(goal) {
  const app = document.getElementById('app');
  app.innerHTML = '';
  const registry = createDefaultRegistry();
  const scenes = registry.pickDailyScenes(goal.categoryId, todayIso(), 3);
  const checked = new Set();

  const panel = el('<div class="panel"><h2>오늘의 행동</h2><div class="sub">한 가지 이상 체크하고 기록하면, 오늘의 페이지가 만들어집니다.</div></div>');
  const list = el('<div></div>');
  scenes.forEach((s) => {
    const item = el('<div class="quest-item"><div class="box"></div><div class="txt">' + s.label + '</div></div>');
    item.onclick = () => {
      if (checked.has(s.id)) { checked.delete(s.id); item.classList.remove('checked'); item.querySelector('.box').textContent = ''; }
      else { checked.add(s.id); item.classList.add('checked'); item.querySelector('.box').textContent = '✓'; }
      submitBtn.disabled = checked.size === 0;
    };
    list.appendChild(item);
  });
  panel.appendChild(list);

  const memo = el('<label class="field" style="margin-top:12px;"><span class="lbl">오늘 한 줄 (선택)</span><textarea class="memo" id="memoInput" placeholder="오늘 느낀 것을 짧게 남겨보세요"></textarea></label>');
  panel.appendChild(memo);

  const submitBtn = el('<button class="btn btn-gold" style="margin-top:6px;" disabled>오늘 기록하기</button>');
  submitBtn.onclick = () => submitDay(goal, scenes.filter((s) => checked.has(s.id)).map((s) => s.label));
  panel.appendChild(submitBtn);

  const restBtn = el('<button class="btn btn-rest">오늘은 쉬어갈게요</button>');
  restBtn.onclick = () => submitDay(goal, []);
  panel.appendChild(restBtn);

  app.appendChild(panel);
}

function submitDay(goal, questLabels) {
  const archive = loadJSON(K.archive, []);
  const { currentStreak: enteringStreak, previousBestStreak } = computeStreakState(archive, todayIso());
  const currentStreak = questLabels.length > 0 ? enteringStreak + 1 : 0;
  const memoEl = document.getElementById('memoInput');
  const result = generateTodayStory({
    categoryId: goal.categoryId,
    dateIso: todayIso(),
    goalStartDateIso: goal.startDateIso,
    targetDateIso: goal.targetDateIso,
    questLabels,
    archive,
    currentStreak,
    previousBestStreak,
    memo: memoEl ? memoEl.value : '',
  });
  archive.push({ dateIso: todayIso(), body: result.body, isRestDay: questLabels.length === 0, hook: result.hook, branch: result.branch, dayNo: result.dayNo });
  saveJSON(K.archive, archive);
  render();
}

function renderStoryCard(entry, streakForStack) {
  const app = document.getElementById('app');
  app.innerHTML = '';
  const stackN = Math.min(5, Math.max(0, streakForStack || 0));
  let shadow = '';
  for (let i = 1; i <= stackN; i++) {
    shadow += (i > 1 ? ', ' : '') + (i * 3) + 'px ' + (i * 3) + 'px 0 rgba(232,220,192,' + (0.9 - i * 0.12) + ')';
  }
  const card = el(
    '<div class="story-page" style="box-shadow:' + shadow + (shadow ? ', ' : '') + '0 10px 24px rgba(0,0,0,0.35);">' +
      '<div class="ribbon"></div>' +
      '<div class="seal">' + (entry.dayNo || '') + '<br>일째</div>' +
      (entry.branch ? '<span class="branch-tag">' + branchLabel(entry.branch) + '</span><br>' : '') +
      '<div class="body-text"></div>' +
    '</div>'
  );
  card.querySelector('.body-text').textContent = entry.body;
  app.appendChild(card);

  const info = el('<div class="panel"><div class="sub" style="margin-bottom:0;">오늘 몫은 기록됐습니다. 내일 다시 와서 이어가 주세요.</div></div>');
  app.appendChild(info);
}
function branchLabel(b) {
  const map = {
    firstDay: '첫 페이지', finalDay: '마지막 페이지', comeback: '돌아온 날', personalBest: '자기 기록 경신',
    milestone: '마일스톤', stageTransition: '새로운 구간', halfway: '절반 지점', finalStretch: '막바지', ordinary: '오늘의 기록', rest: '쉬는 날',
  };
  return map[b] || b;
}

function renderCompletion(goal, archive) {
  const app = document.getElementById('app');
  app.innerHTML = '';
  const snap = ensureArchived(goal, archive);

  const panel = el('<div class="panel"><h2>' + goal.bookTitle + '</h2><div class="sub">' + (snap.achieved ? '끝까지 해냈습니다.' : '완주하지 못했어도, 여정은 남았습니다.') + '</div></div>');
  const stats = el('<div class="stat-grid"></div>');
  stats.appendChild(el('<div class="stat-box"><div class="n">' + snap.totalPages + '</div><div class="l">기록된 페이지</div></div>'));
  stats.appendChild(el('<div class="stat-box"><div class="n">' + snap.activeDays + '</div><div class="l">활동일</div></div>'));
  stats.appendChild(el('<div class="stat-box"><div class="n">' + snap.restDays + '</div><div class="l">쉬어간 날</div></div>'));
  panel.appendChild(stats);

  if (!snap.purchase) {
    const buyBtn = el('<button class="btn btn-gold">9,900원에 책으로 간직하기</button>');
    buyBtn.onclick = async () => {
      buyBtn.disabled = true; buyBtn.textContent = '결제창으로 이동 중...';
      try {
        const orderId = generateOrderId(todayIso());
        await startTossCheckout(goal.bookTitle, orderId);
      } catch (e) {
        showBanner('err', '결제를 시작하지 못했습니다: ' + e.message);
        buyBtn.disabled = false; buyBtn.textContent = '9,900원에 책으로 간직하기';
      }
    };
    panel.appendChild(buyBtn);
  } else {
    panel.appendChild(el('<div class="banner ok" style="margin-top:4px;">이미 구매하신 책입니다. 서재에서 다시 볼 수 있어요.</div>'));
  }

  const newBtn = el('<button class="btn btn-ghost">새 목표 시작하기</button>');
  newBtn.onclick = () => {
    localStorage.removeItem(K.goal);
    localStorage.removeItem(K.archive);
    render();
  };
  panel.appendChild(newBtn);

  app.appendChild(panel);
}

async function handlePaymentRedirect() {
  const params = new URLSearchParams(window.location.search);
  const flag = params.get('tosspay');
  if (!flag) return false;

  if (flag === 'fail') {
    showBanner('err', '결제가 완료되지 않았습니다. 다시 시도해 주세요.');
    history.replaceState({}, '', window.location.pathname);
    return true;
  }
  if (flag === 'success') {
    try {
      const result = await handleTossSuccessRedirect();
      const purchaseInfo = buildPurchaseInfoFromToss(result, result.bookTitle);
      const goal = loadJSON(K.goal, null);
      if (goal) {
        updateArchivedPurchase(goal, purchaseInfo);
        localStorage.removeItem(K.goal);
        localStorage.removeItem(K.archive);
      }
      showBanner('ok', '구매가 완료됐습니다! "' + purchaseInfo.bookTitle + '"이(가) 서재에 담겼습니다. 새 이야기를 시작해 보세요.');
    } catch (e) {
      showBanner('err', '결제 확인 중 문제가 발생했습니다: ' + e.message);
    }
    history.replaceState({}, '', window.location.pathname);
    return true;
  }
  return false;
}

async function render() {
  const goal = loadJSON(K.goal, null);
  const archive = loadJSON(K.archive, []);

  if (!goal) { renderGoalForm(); return; }

  if (isPeriodEnded(goal, todayIso())) { renderCompletion(goal, archive); return; }

  const last = archive.length ? archive[archive.length - 1] : null;
  if (last && last.dateIso === todayIso()) {
    const { currentStreak } = computeStreakState(archive.slice(0, -1), todayIso());
    renderStoryCard({ body: last.body, dayNo: last.dayNo || (daysBetween(goal.startDateIso, todayIso()) + 1), branch: last.branch || (last.isRestDay ? 'rest' : null) }, currentStreak + 1);
    return;
  }
  renderQuestChecklist(goal);
}

(async function init() {
  const handled = await handlePaymentRedirect();
  await render();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();
</script>
</body>
</html>
